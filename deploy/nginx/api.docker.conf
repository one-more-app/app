# Nginx dev / Docker : reverse proxy vers le service `api` (port 3000).
# Tester Socket.IO :
#   curl -i "http://localhost:3080/socket.io/?EIO=4&transport=polling"

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream onemore_api {
    server api:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size 10m;

    # Socket.IO (namespace applicatif /realtime monté sur ce chemin)
    location /socket.io/ {
        include /etc/nginx/snippets/websocket.conf;
        proxy_pass http://onemore_api;
    }

    # API REST NestJS
    location / {
        include /etc/nginx/snippets/websocket.conf;
        proxy_pass http://onemore_api;
    }
}
