# Nginx production (VPS) — api.one-more.app / api.staging.one-more.app
#
# 1. Copier ce fichier :
#      sudo cp deploy/nginx/api.conf /etc/nginx/sites-available/onemore-api.conf
#      sudo ln -sf /etc/nginx/sites-available/onemore-api.conf /etc/nginx/sites-enabled/
# 2. Copier le snippet :
#      sudo mkdir -p /etc/nginx/snippets
#      sudo cp deploy/nginx/snippets/websocket.conf /etc/nginx/snippets/onemore-websocket.conf
# 3. Remplacer les noms de domaine et l'upstream si besoin.
# 4. sudo nginx -t && sudo systemctl reload nginx

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream onemore_api {
    # Processus Nest (Docker publish 3000, PM2, ou socket unix)
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.one-more.app api.staging.one-more.app;

    # Redirection HTTPS (certbot / Let's Encrypt)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.one-more.app api.staging.one-more.app;

    # Certificats Let's Encrypt (chemins certbot classiques)
    ssl_certificate     /etc/letsencrypt/live/api.one-more.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.one-more.app/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    location /socket.io/ {
        include /etc/nginx/snippets/onemore-websocket.conf;
        proxy_pass http://onemore_api;
    }

    location / {
        include /etc/nginx/snippets/onemore-websocket.conf;
        proxy_pass http://onemore_api;
    }
}
