version: "3"

vars:
  NPM: npm

tasks:
  default:
    desc: Liste les tâches disponibles
    cmds:
      - task --list

  install:
    desc: Installe les dépendances (workspaces client + api)
    cmds:
      - "{{.NPM}} install"

  dev:
    desc: Démarre la DB puis lance client + API en parallèle (défaut)
    deps: [docker, dev:client, dev:api]

  dev:client:
    desc: Serveur de dev Vite (client/)
    cmds:
      - "{{.NPM}} run dev -w client"

  dev:api:
    desc: API Nest en mode watch (api/)
    cmds:
      - "{{.NPM}} run start:dev -w api"

  build:
    desc: Build production du client (PWA / Capacitor)
    cmds:
      - "{{.NPM}} run build -w client"

  build:api:
    desc: Compile l’API Nest
    cmds:
      - "{{.NPM}} run build -w api"

  lint:
    desc: ESLint client puis API
    cmds:
      - "{{.NPM}} run lint -w client"
      - "{{.NPM}} run lint -w api"

  preview:
    desc: Prévisualise le build client (après task build)
    cmds:
      - "{{.NPM}} run preview -w client"

  cap:sync:
    desc: Build client + synchronisation Capacitor (android/ios)
    cmds:
      - "{{.NPM}} run cap:sync -w client"

  docker:
    desc: Démarre Postgres local (docker compose)
    cmds:
      - docker compose up -d

  docker:down:
    desc: Arrête les conteneurs compose
    cmds:
      - docker compose down

  migration:run:
    desc: Exécute les migrations TypeORM
    deps: [docker]
    dir: api
    cmds:
      - npm run typeorm:migrate

  migration:create:
    desc: Crée un squelette de migration TypeORM
    dir: api
    cmds:
      - npm run typeorm:migration:create

  migration:generate:
    desc: Génère une migration TypeORM depuis les entities
    deps: [docker]
    dir: api
    cmds:
      - npm run typeorm:migration:generate

  seed:exercises:
    desc: Seed du catalogue exercices depuis client
    dir: api
    cmds:
      - npm run seed:exercises

  test:api:
    desc: Tests unitaires API
    cmds:
      - "{{.NPM}} run test -w api"
