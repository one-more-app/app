version: "3"

vars:
  NPM: npm

tasks:
  default:
    desc: Liste les tâches disponibles
    cmds:
      - task --list

  install:
    desc: Installe les dépendances (client + api)
    cmds:
      - task: install:client
      - task: install:api

  install:client:
    desc: Installe les dépendances du client
    dir: client
    cmds:
      - "{{.NPM}} install"

  install:api:
    desc: Installe les dépendances de l’API
    dir: api
    cmds:
      - "{{.NPM}} install"

  dev:
    desc: Démarre la DB puis lance client + API en parallèle (défaut)
    deps: [docker, dev:client, dev:api]

  dev:client:
    desc: Serveur de dev Vite (client/)
    dir: client
    cmds:
      - "{{.NPM}} run dev"

  dev:api:
    desc: API Nest en mode watch (api/)
    dir: api
    cmds:
      - "{{.NPM}} run start:dev"

  build:
    desc: Build production du client (PWA / Capacitor)
    dir: client
    cmds:
      - "{{.NPM}} run build"

  build:api:
    desc: Compile l’API Nest
    dir: api
    cmds:
      - "{{.NPM}} run build"

  lint:
    desc: ESLint client puis API
    cmds:
      - task: lint:client
      - task: lint:api

  lint:client:
    desc: ESLint du client
    dir: client
    cmds:
      - "{{.NPM}} run lint"

  lint:api:
    desc: ESLint de l’API
    dir: api
    cmds:
      - "{{.NPM}} run lint"

  preview:
    desc: Prévisualise le build client (après task build)
    dir: client
    cmds:
      - "{{.NPM}} run preview"

  cap:sync:
    desc: Build client + synchronisation Capacitor (android/ios)
    dir: client
    cmds:
      - "{{.NPM}} run cap:sync"

  docker:
    desc: Démarre Postgres local (docker compose)
    cmds:
      - docker compose up -d

  docker:down:
    desc: Arrête les conteneurs compose
    cmds:
      - docker compose down

  migration:run:
    desc: Exécute les migrations TypeORM
    deps: [docker]
    dir: api
    cmds:
      - "{{.NPM}} run typeorm:migrate"

  migration:create:
    desc: Crée un squelette de migration TypeORM
    dir: api
    cmds:
      - "{{.NPM}} run typeorm:migration:create"

  migration:generate:
    desc: Génère une migration TypeORM depuis les entities
    deps: [docker]
    dir: api
    cmds:
      - "{{.NPM}} run typeorm:migration:generate"

  seed:exercises:
    desc: Seed du catalogue exercices (api/data/popular-exercises.json)
    dir: api
    cmds:
      - "{{.NPM}} run seed:exercises"

  seed:exercises:replace:
    desc: Seed catalogue + supprime les exos absents du JSON actif (rollback propre)
    dir: api
    cmds:
      - "{{.NPM}} run seed:exercises:replace"

  catalog:fetch-all:
    desc: Télécharge tous les exercices ExerciseDB vers api/data/popular-exercises.all.json
    dir: api
    cmds:
      - "{{.NPM}} run fetch:all-exercises"

  catalog:use-all:
    desc: Active le catalogue complet (1500 exos) + seed base
    dir: api
    cmds:
      - "{{.NPM}} run catalog:use-all"
      - "{{.NPM}} run seed:exercises:replace"

  catalog:use-filtered:
    desc: Rollback vers le catalogue filtré (569 exos) + seed base
    dir: api
    cmds:
      - "{{.NPM}} run catalog:use-filtered"
      - "{{.NPM}} run seed:exercises:replace"

  test:api:
    desc: Tests unitaires API
    dir: api
    cmds:
      - "{{.NPM}} run test"
